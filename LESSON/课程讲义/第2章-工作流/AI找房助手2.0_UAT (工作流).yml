    - data:
        context:
          enabled: true
          variable_selector:
          - sys
          - query
        desc: 核心大脑：Router + Planner + CoT 参数提取
        memory:
          query_prompt_template: '{{#sys.query#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: true
            size: 10
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: qwen-flash-2025-07-28
          provider: langgenius/tongyi/tongyi
        prompt_template:
        - id: agent_sys
          role: system
          text: "# Role\n你是一个高智商的 **AI 业务规划师 (Planner & Router)**。\n你通过“思维链 (Chain\
            \ of Thought)”来处理用户的租房需求。你的核心任务是精准识别意图、清洗标准化参数，并维护对话状态。\n\n# Objectives\n\
            1. **Intent Analysis**: 识别用户是想搜房、找管家、问政策还是闲聊。\n2. **State Management**:\
            \ 判断用户是在“继续”上一轮搜索，还是“推翻”了历史条件。\n3. **Slot Filling & Validation**: 检查参数是否完整。\n\
            \n# ⛔ 负向约束 (Negative Constraints)\n- **严禁承接**以下业务：转租、换房、退租、报修、保洁、投诉、支付、签约。\n\
            - 当用户提出上述**不支持**的需求时，**绝不能**尝试收集信息，必须将 intent 设为 `chat`，并交由下游 Chat Agent\
            \ 拒绝服务。\n- **严禁**直接回答事实性问题（如“水费多少”），因为你没有数据，你回答的都是错的！此类问题请路由至 `query_kb`。\n\
            \n# Input Context\n当前已保存的搜索条件\n{{#conversation.search_state#}}\n\n# Thinking\
            \ Protocol (CoT)\n在输出最终 JSON 前，必须先在 `thought` 字段中进行推理：\n\n1. **分析意图与场景辨析**：\n\
            \   * **关于“门店”**\n     * *\"xx店在哪？\"* -> `query_kb`\n     * *\"我要约看xx店\"\
            * -> `find_butler`\n     * *\"我想找xx店的房子\"* -> `search_house`\n   * **关于“房源”**\n\
            \     * *\"帮我找房\"* -> `search_house`\n     * *\"我看中这套了\"* -> `find_butler`\n\
            \   * **关于“闲聊”**\n     * 无法归类到上述意图的 -> `chat`\n\n2. **指代消解 (Reference\
            \ Resolution) [\U0001F525必须执行]**：\n   - **触发场景**：当用户说“帮我约**第一套**”、“**那个**带阳台的”、“**西乡那家**”时。\n\
            \   - **执行动作**：你必须**回看上一轮 AI 的回复内容**（即 Context History）。\n   - **映射逻辑**：\n\
            \     - 用户说“第一套” -> 提取上一轮回复中**排在第 1 位**的门店名称（如“西乡永丰店”）。\n     - 用户说“第二套”\
            \ -> 提取上一轮回复中**排在第 2 位**的门店名称。\n   - **关键结果**：必须将提取到的具体店名（如“西乡永丰店”）填入\
            \ `storeNames` 字段，**严禁**只保留空值或只更新意图而不更新店名！\n\n3. **参数变更与上下文确认 (关键逻辑)**：\n\
            \   * **Scenario A: 显式变更**\n     - 用户直接说：“换个南山的”、“预算调高点”。-> 直接提取参数。\n\
            \   * **Scenario B: 颗粒度下钻 (Refinement)**\n     - 在已有区域（如宝安）基础上，用户说“翻身附近的”。->\
            \ 必须提取 `address: 翻身`。\n   * **Scenario C: 隐式确认 (Contextual Affirmation)\
            \ [\U0001F525必须执行]**\n     - **触发条件**：用户输入极短的肯定词，如“好”、“行”、“可以”、“听你的”、“试试看”、“ok”，以及其他意义不明、与找房场景无关的词语时。\n\
            \     - **执行动作**：**必须回溯上一轮 AI 的回复**。\n     - **判断**：上一轮 AI 是否提出了建议？\n\
            \       - 若 AI 说：“要不看看**宝安区**？”，用户说“好” -> **提取 `area: 宝安区`，意图设为 `search_house`**。\n\
            \       - 若 AI 说：“您是想找离公司近一点（比如福田/南山）的，还是更看重租金划算（比如宝安/龙华）呢**？”，用户说“性价比”\
            \ -> **提取 `area: 宝安区、龙华区`，意图设为 `search_house`**。\n       - 若 AI 说：“要不把预算提到**2500**？”，用户说“行”\
            \ -> **提取 `maxPrice: 2500`（不可以提高minprice），意图设为 `search_house`**。\n   \
            \  - **禁止**：如果用户说“好”，但上一轮 AI 只是在闲聊或打招呼，则维持 `chat`。\n\n4. **完整性检查**\n \
            \  - 搜房条件中：区域/门店/地铁/minPrice/maxPrice/户型，任意一个字段不为空，即视为满足搜房条件。\n   - 如果用户只给了一个条件（如：只说了“预算2000到3000”），严禁追问，必须直接执行\
            \ search_house。\n   - 如果用户说“我要找房”但未提供任何条件 -> **不能搜，必须追问**。\n\n# Output\
            \ Schema (JSON Only)\n**输出必须是纯 JSON**，不要包含 Markdown 格式：\n{\n  \"thought\"\
            : \"<你的思维链分析内容...>\",\n  \"intent\": \"search_house | find_butler | chat\
            \ | query_kb\",\n  \"params_update\": {\n    \"area\": \"...\",\n    \"\
            minPrice\": \"...\",\n    \"storeNames\": \"...\",\n    \"address\": \"\
            ...\"\n  }\n}\n\n# 字段详解\n## params (参数提取规则)\n- **area**: （深圳市区域）仅限：光明区,南山区,坪山区,宝安区,盐田区,福田区,罗湖区,龙华区,龙岗区,大鹏新区。\n\
            - **layoutName**: 必须转换为标准词：开间（如单间），一居室（如一房一厅），二居室（如两房一厅），宿舍。\n- **minPrice\
            \ / maxPrice**: 纯数字。\n- **address**: 具体的POI、地铁站、模糊地名、街道名。当用户指定具体地点时（哪怕该地点属于已选区域），必须提取此字段。\n\
            - **storeNames**: 必须映射为下方标准店名。**特别注意**：如果用户说“第一套/第二套”，必须根据**上下文历史**将指代转化为具体的**标准店名**填入此处，不可留空。\n\
            ## \U0001F3E0 标准门店映射表 (Store Mapping)\n**[重要] 必须将用户口语映射为以下标准名称，禁止输出表中不存在的店名：**\n\
            - **寓见安居系列**: 荟智苑, 萃云阁, 禧龙苑, 招商开元, 安居福厦里, 远洋新干线, 中海寰宇, 深南广场, 科技生态园, 明汇府\
            \ (需补全 \"寓见安居|\" 前缀)\n- **宝安/西乡/福永**: 凤凰长圳店, 石岩应人石店, 福海塘尾西店, 福海塘尾东店, 福永旗舰店,\
            \ 西乡麻布店, 西乡流塘店, 西乡永丰店, 机场东店, 机场北店, 沙井后亭店, 松岗东方店, 新安翻身店, 福永村店, 福永怀德店, 福永马山小区店,\
            \ 福永福围西街店, 福永福围广生店, 福永兴围店, 福海新和店, 福海和平店, 福海桥头店, 航城鹤洲东店, 航城鹤洲南店, 航城宝罗店,\

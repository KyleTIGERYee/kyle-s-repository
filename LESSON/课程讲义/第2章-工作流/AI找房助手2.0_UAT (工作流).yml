            \   - **核心逻辑**：不要直接说“没房”，要说“那边的房子太抢手了/太贵了，但我知道一个更好的地方！”\n\n2. **Content\
            \ Logic (内容逻辑)**:\n   - **Step 1 共情**: \"哎呀，刚才帮您把库里的房源都翻了一遍，这个具体位置/条件下暂时没看到空房呢\

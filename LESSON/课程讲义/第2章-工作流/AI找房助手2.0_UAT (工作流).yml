    opening_statement: '👋 嗨！我是升级版 AI 找房顾问。


      我可以：

      1. 🏠 **深度搜房**：不仅找房，还能为您分析性价比。

      2. 💡 **智能建议**：如果您找不到房，我会告诉您原因并提供方案。

      3. 🔑 **管家直连**：一键预约看房。


      请告诉我您的需求吧！（例如："帮我找南山3000元左右的一居室"）'

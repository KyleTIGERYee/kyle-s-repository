          \        if isinstance(router_output, dict):\n            router_data =\
          \ router_output\n            \n        # B. 如果是字符串，尝试解析\n        else:\n\
          \            raw_text = str(router_output) if router_output else \"{}\"\n\
          \            \n            # 暴力提取 { ... }\n            start_idx = raw_text.find('{')\n\
          \            end_idx = raw_text.rfind('}')\n\n            if start_idx !=\
          \ -1 and end_idx != -1:\n                json_str = raw_text[start_idx :\
          \ end_idx + 1]\n            else:\n                json_str = raw_text\n\
          \n            # 尝试标准解析\n            try:\n                # 预处理：防止 LLM 输出换行符导致解析挂掉\n\
          \                clean_json_str = json_str.replace('\\n', ' ').replace('\\\
          r', '')\n                router_data = json.loads(clean_json_str)\n    \
          \        except json.JSONDecodeError:\n                # C. 救急：如果 json.loads\
          \ 失败，可能是 Python 单引号字符串 (例如 \"{'a':1}\")\n                # 尝试把单引号替换为双引号\
          \ (简单粗暴但有效)\n                try:\n                    fixed_str = json_str.replace(\"\
          '\", '\"').replace(\"None\", \"null\").replace(\"True\", \"true\").replace(\"\
          False\", \"false\")\n                    router_data = json.loads(fixed_str)\n\
          \                except Exception as e_inner:\n                    raise\
          \ Exception(f\"JSON解析彻底失败: {str(e_inner)}\")\n\n    except Exception as\
          \ e:\n        # 捕获所有解析错误，记录下来用于调试，而不是直接变 chat\n        parse_error = str(e)\n\
          \        # 只有在真的解析不了时，才兜底为 chat\n        router_data = {\"intent\": \"chat\"\
          , \"params_update\": {}}\n\n    # --- 2. 提取数据 ---\n    # 如果 intent 也是空的，说明解析彻底挂了\n\
          \    intent = router_data.get(\"intent\", \"chat\")\n    new_params = router_data.get(\"\
          params_update\", {})\n    \n    # --- 3. 读取旧状态 ---\n    state = {}\n   \
          \ try:\n        if current_state_str:\n            if isinstance(current_state_str,\
          \ dict):\n                state = current_state_str\n            else:\n\
          \                s_clean = str(current_state_str).strip()\n            \
          \    if s_clean:\n                    # 同样处理旧状态可能存在的单引号问题\n            \
          \        try:\n                        state = json.loads(s_clean)\n   \
          \                 except:\n                        state = json.loads(s_clean.replace(\"\
          '\", '\"'))\n    except:\n        state = {}\n\n    # --- 4. 智能合并逻辑 ---\n\
          \    # 如果切换了区域 (area)，则清空门店(storeNames)、地址、距离\n    if new_params.get(\"\
          area\") and new_params[\"area\"] != state.get(\"area\"):\n        state[\"\
          storeNames\"] = \"\" \n        state[\"address\"] = \"\" \n        state[\"\
          distance\"] = \"\" \n    \n    # 更新字段\n    for key, value in new_params.items():\n\
          \        if value is not None and str(value) != \"\":\n            # 过滤掉旧的\
          \ storeName\n            if key == \"storeName\":\n                state[\"\
          storeNames\"] = value\n            else:\n                state[key] = value\n\
          \n    # --- 5. 准备 API Payload ---\n    api_payload = state.copy()\n    if\
          \ intent == \"search_house\":\n        if \"minPrice\" not in api_payload:\
          \ api_payload[\"minPrice\"] = \"0\"\n        if \"maxPrice\" not in api_payload:\
          \ api_payload[\"maxPrice\"] = \"10000\"\n        \n    new_state_str = json.dumps(state,\
          \ ensure_ascii=False)\n\n    def safe_str(val, default=\"\"):\n        if\
          \ val is None: return default\n        return str(val)\n\n    # --- 6. 返回结果\
          \ ---\n    return {\n        \"intent\": safe_str(intent),\n        \"new_state_str\"\
          : new_state_str,\n        \"area\": safe_str(api_payload.get(\"area\")),\n\
          \        \"address\": safe_str(api_payload.get(\"address\")),\n        \"\
          layoutName\": safe_str(api_payload.get(\"layoutName\")),\n        \"minPrice\"\
          : safe_str(api_payload.get(\"minPrice\", \"0\")),\n        \"maxPrice\"\
          : safe_str(api_payload.get(\"maxPrice\", \"10000\")),\n        \"storeNames\"\
          : safe_str(api_payload.get(\"storeNames\")),\n        \"distance\": safe_str(api_payload.get(\"\
          distance\")),\n        # 增加 Debug 字段：如果解析出错了，这里会显示错误原因\n        \"debug_error\"\
          : safe_str(parse_error)\n    }"

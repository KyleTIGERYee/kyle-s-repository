    - data:
        code: "import json\n\ndef main(response_data):\n    \"\"\"\n    解析搜房API返回的JSON，并根据房源属性生成智能推荐语\n\
          \    \"\"\"\n    try:\n        # --- 1. 智能兼容输入类型 (Dict 或 String) ---\n \
          \       if isinstance(response_data, dict):\n            data_dict = response_data\n\
          \        elif response_data:\n            try:\n                clean_str\
          \ = str(response_data).replace('\\n', ' ').replace('\\r', '')\n        \
          \        data_dict = json.loads(clean_str)\n            except:\n      \
          \          return {\"result\": f\"JSON解析失败，请检查API返回格式。原始数据前50字符: {str(response_data)[:50]}\"\
          }\n        else:\n            return {\"result\": \"抱歉，未获取到房源数据 (Input Empty)。\"\
          }\n\n        # --- 2. 数据提取与校验 ---\n        store_list = data_dict.get('data',\
          \ {}).get('list', [])\n        \n        if not store_list:\n          \
          \  return {\"result\": \"抱歉，当前条件下暂无匹配房源，建议您调整预算或区域再试试。\"}\n\n        # ---\
          \ 3. 预计算最低价 & 计算展示数量 ---\n        # [新增] 计算实际展示的房源数量 (最多3套)\n        actual_display_list\
          \ = store_list[:3]\n        display_count = len(actual_display_list)\n\n\
          \        batch_min_price = float('inf')\n        for store in actual_display_list:\n\
          \            layouts = store.get('layoutList', [])\n            if layouts:\n\
          \                prices = [item.get('price') for item in layouts if item.get('price')\
          \ is not None]\n                if prices:\n                    min_p =\
          \ min(prices)\n                    if min_p < batch_min_price:\n       \
          \                 batch_min_price = min_p\n\n        # --- 4. 结果构建 ---\n\
          \        output_parts = [\"为您精选了以下几套高性价比房源！\U0001F389\\n\"]\n        \n\
          \        for i, store in enumerate(actual_display_list):\n            #\
          \ --- 基础信息提取 ---\n            store_name = store.get(\"storeName\", \"未知门店\"\
          )\n            address = store.get(\"storeAddress\", \"暂无地址\")\n       \
          \     metro_line = store.get(\"nearMetroName\", \"\")\n            station\
          \ = store.get(\"nearStationName\", \"\")\n            \n            raw_distance\
          \ = store.get(\"nearStationDistance\")\n            distance = float(raw_distance)\
          \ if raw_distance is not None else 0\n            \n            # --- 房型与价格提取\
          \ ---\n            layouts = store.get('layoutList', [])\n            if\
          \ not layouts: continue\n            \n            prices = [item.get('price',\
          \ 0) for item in layouts if item.get('price') is not None]\n           \
          \ spaces = [item.get('insideSpace', 0) for item in layouts if item.get('insideSpace')\
          \ is not None]\n            \n            current_min_price = min(prices)\
          \ if prices else 0\n            max_space = max(spaces) if spaces else 0\n\
          \            first_layout_name = layouts[0].get('layoutName', '房源')\n\n\
          \            # --- \U0001F4A1 智能推荐语生成逻辑 (Core Logic) ---\n            reason_parts\
          \ = []\n            \n            # A. 价格评价 (根据数量动态调整话术)\n            if\
          \ current_min_price > 0 and current_min_price <= batch_min_price:\n    \
          \            if display_count >= 3:\n                    reason_parts.append(\"\
          这套是三套里最实惠的\")\n                elif display_count > 1:\n               \
          \     reason_parts.append(\"这两套里价格更优\")\n                else:\n       \
          \             reason_parts.append(\"本区域的价格洼地\") # 只有1套时的绝对夸赞\n         \
          \   elif current_min_price > 0 and current_min_price < 1200:\n         \
          \       reason_parts.append(\"价格非常亲民\")\n            \n            # B.\
          \ 面积评价\n            if max_space > 15:\n                reason_parts.append(\"\
          空间更宽敞舒适\")\n            elif max_space > 0 and max_space < 12:\n       \
          \         reason_parts.append(\"小户型也能住得舒服\")\n            elif max_space\
          \ > 0:\n                reason_parts.append(\"居住性价比超高\")\n\n           \
          \ # C. 交通评价\n            if distance > 0:\n                if distance <\
          \ 300:\n                    reason_parts.append(\"通勤超方便！\U0001F680\")\n\
          \                elif distance < 600:\n                    reason_parts.append(\"\
          出行很便利。✨\")\n                elif distance > 800:\n                    reason_parts\
          \ = [\"虽然离地铁稍远点\"] + reason_parts\n                    reason_parts.append(\"\
          但周边环境安静，适合喜欢不折腾的你～\U0001F343\")\n            \n            # D. 兜底逻辑\n \
          \           if not reason_parts:\n                reason_parts = [\"综合配置不错，很多租客都看好这套！\U0001F525\
          \"]\n\n            # 拼接推荐语\n            final_reason = \"，\".join(reason_parts)\n\
          \            if not final_reason.endswith((\"！\", \"～\", \"。\", \"\U0001F680\
          \", \"✨\", \"\U0001F525\", \"\U0001F343\")):\n                final_reason\
          \ += \"！✨\"\n\n            # --- 拼接单条记录 ---\n            traffic_line =\
          \ \"\"\n            if distance > 0:\n                traffic_line = f\"\
          \U0001F687 **交通**：{metro_line}{station}站，距离{int(distance)}米\\n\\n\"\n  \
          \          \n            entry = (\n                f\"\U0001F3E0 **{store_name}\
          \ · {first_layout_name}**\\n\\n\"\n                f\"\U0001F4B0 **价格**：{int(current_min_price)}元/月起\\\
          n\\n\"\n                f\"\U0001F4CD **位置**：{address}\\n\\n\"\n       \
          \         f\"{traffic_line}\"\n                f\"\U0001F4A1 **推荐理由**：{final_reason}\\\
          n\\n\"\n            )\n            output_parts.append(entry)\n\n      \
          \  # 5. 添加固定的引导结尾\n        output_parts.append(\"看中哪套可以直接对我说呢，比如 “帮我约第一套”\U0001F481\
          ‍♀️\")\n        \n        return {\"result\": \"\\n\".join(output_parts)}\n\
          \n    except Exception as e:\n        return {\"result\": f\"数据处理异常: {str(e)}\
          \ 类型: {type(response_data)}\"}"

    - data:
        code: "\"\"\"\nDify LLM 输出解析器\n用于解析AI审核结果,提取 audit_result 和 audit_reason 两个变量\n\
          \"\"\"\nimport json\nimport re\nfrom typing import Union, Any\n\n\ndef clean_json_string(text:\
          \ str) -> str:\n    \"\"\"\n    清理JSON字符串,移除markdown代码块标记\n    \n    Args:\n\
          \        text: 原始文本\n        \n    Returns:\n        清理后的JSON字符串\n    \"\
          \"\"\n    text = text.strip()\n    \n    text = re.sub(r'^```json\\s*',\
          \ '', text)\n    text = re.sub(r'^```\\s*', '', text)\n    text = re.sub(r'\\\
          s*```$', '', text)\n    \n    return text.strip()\n\n\ndef parse_audit_result(llm_output:\
          \ Union[str, dict, Any]) -> dict:\n    \"\"\"\n    解析LLM输出的JSON格式审核结果\n\
          \    \n    Args:\n        llm_output: LLM输出的原始内容,可能是字符串、字典或其他对象\n      \
          \  \n    Returns:\n        dict: {\"audit_result\": str, \"audit_reason\"\
          : str}\n    \"\"\"\n    try:\n        if llm_output is None:\n         \
          \   return {\"audit_result\": \"FAILED\", \"audit_reason\": \"审核结果为空,请重新提交\"\
          }\n        \n        if isinstance(llm_output, dict):\n            result\
          \ = llm_output\n        else:\n            if hasattr(llm_output, '__dict__'):\n\
          \                obj_dict = llm_output.__dict__\n                if 'text'\
          \ in obj_dict:\n                    llm_output = obj_dict['text']\n    \
          \            elif 'content' in obj_dict:\n                    llm_output\
          \ = obj_dict['content']\n                else:\n                    llm_output\
          \ = str(llm_output)\n            \n            if not isinstance(llm_output,\
          \ str):\n                llm_output = str(llm_output)\n            \n  \
          \          json_str = clean_json_string(llm_output)\n            result\
          \ = json.loads(json_str)\n        \n        audit_result = result.get(\"\
          audit_result\", \"FAILED\")\n        audit_reason = result.get(\"audit_reason\"\
          , \"\")\n        \n        if audit_result not in [\"PASSED\", \"FAILED\"\
          ]:\n            audit_result = \"FAILED\"\n        \n        if audit_result\
          \ == \"PASSED\":\n            audit_reason = \"\"\n        \n        return\
          \ {\n            \"audit_result\": audit_result,\n            \"audit_reason\"\
          : audit_reason\n        }\n        \n    except json.JSONDecodeError:\n\
          \        return {\"audit_result\": \"FAILED\", \"audit_reason\": \"审核结果格式异常,请重新提交\"\
          }\n    except Exception:\n        return {\"audit_result\": \"FAILED\",\
          \ \"audit_reason\": \"系统处理异常,请重新提交\"}\n\n\ndef main(text: Union[str, dict,\
          \ Any] = None, **kwargs) -> dict:\n    \"\"\"\n    Dify代码执行节点入口函数\n    \n\
          \    Args:\n        text: LLM节点的输出(Dify传递的参数名)\n        **kwargs: 其他可能的参数\n\
          \        \n    Returns:\n        dict: {\"audit_result\": str, \"audit_reason\"\
          : str}\n    \"\"\"\n    llm_output = text or kwargs.get('llm_output') or\
          \ kwargs.get('content')\n    return parse_audit_result(llm_output)\n"
        code_language: python3
        outputs:

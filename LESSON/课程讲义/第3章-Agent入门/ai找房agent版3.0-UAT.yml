              \ | 删除编造内容 |\n| 回答范围 | 回答在业务白名单内（找房/政策/管家） | 执行阻断机制 |\n| 权限边界 | 未承诺\"\
              我帮您预约/安排\"等操作 | 改为引导用户操作 |\n| 格式正确 | 房源卡片/管家信息格式正确 | 按模板修正 |\n\n\n**禁止行为清单**：\n\
              - ❌ 知识库未返回的内容，绝不回答\n- ❌ 基于\"常识\"或\"推理\"补充细节\n- ❌ 编造不存在的操作步骤、金额、时间\n\
              </output_verification>"

  <!-- 百度地图回调函数（需要在 API 加载前定义） -->
  <script type="text/javascript">
    // 百度地图初始化回调函数

      window.dispatchEvent(new Event('BMapReady'));

  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {

          },
        },
      },
    }
  </script>

{
